<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Мета-теги для правильного отображения в Telegram -->
    <meta property="og:title" content="365 информатика | Навигатор по курсам">
    <meta property="og:description" content="Удобный доступ к материалам по Microsoft Office, E-commerce, BI, машинному обучению и Frontend">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://YOUR_USERNAME.github.io/telegram-app/">
    
    <title>365 информатика | Навигатор</title>
    
    <style>
        /* Сброс стилей и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f2f5 0%, #e0e5ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }

        /* Основной контейнер приложения */
        .app-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px 20px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 
                        0 4px 12px rgba(0, 0, 0, 0.06),
                        inset 0 1px 2px rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: clamp(24px, 7vw, 32px);
            font-weight: 600;
            background: linear-gradient(135deg, #1e2b3a, #2c3e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .header p {
            color: #4a5a6e;
            font-size: 16px;
            font-weight: 500;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* Сетка для кнопок */
        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Стиль каждой карточки-кнопки */
        .menu-button {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #ffffff;
            padding: 10px 18px 10px 14px;
            border-radius: 100px;
            text-decoration: none;
            color: #1f2a36;
            font-weight: 500;
            font-size: 17px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05), 
                        0 2px 4px rgba(0, 0, 0, 0.03),
                        inset 0 -2px 0 rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            /* Анимация появления */
            animation: slideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) backwards;
            will-change: transform, box-shadow;
        }

        /* Задержки для анимации появления (обновлено для 7 кнопок) */
        .menu-button:nth-child(1) { animation-delay: 0.05s; }
        .menu-button:nth-child(2) { animation-delay: 0.1s; }
        .menu-button:nth-child(3) { animation-delay: 0.15s; }
        .menu-button:nth-child(4) { animation-delay: 0.2s; }
        .menu-button:nth-child(5) { animation-delay: 0.25s; }
        .menu-button:nth-child(6) { animation-delay: 0.3s; }
        .menu-button:nth-child(7) { animation-delay: 0.35s; }

        /* Эффект наведения и касания */
        @media (hover: hover) {
            .menu-button:hover {
                transform: scale(1.02) translateY(-3px);
                box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.06);
                border-color: rgba(255, 255, 255, 0.9);
            }
            
            .menu-button:hover .icon-wrapper {
                transform: rotate(5deg) scale(1.05);
            }
            
            .menu-button:hover .arrow {
                transform: translateX(5px);
                color: #2673e8;
            }
        }

        /* Активный тап на мобильных устройствах */
        .menu-button:active {
            transform: scale(0.98) translateY(0);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.1s ease;
        }

        .menu-button:active .icon-wrapper {
            transform: scale(0.95);
        }

        /* Контейнер для иконки */
        .icon-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 40px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08), inset 0 -2px 0 #d0d9e2;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        /* Сами иконки */
        .icon {
            font-size: 32px;
            line-height: 1;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        /* Текст кнопки и стрелка */
        .button-text {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .button-text span {
            font-size: 17px;
            font-weight: 550;
            letter-spacing: -0.2px;
            color: #1a2632;
        }

        /* Анимированная стрелка */
        .arrow {
            font-size: 22px;
            color: #5f6b7a;
            transition: transform 0.25s ease;
            margin-left: 8px;
        }

        /* Ключевые кадры для появления */
        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Цветовые акценты для иконок (обновлено для 7 кнопок) */
        .menu-button:nth-child(1) .icon-wrapper { background: linear-gradient(145deg, #e8f0fe, #d9e6fc); } /* Word */
        .menu-button:nth-child(2) .icon-wrapper { background: linear-gradient(145deg, #e6f4e8, #c8e6d9); } /* Excel */
        .menu-button:nth-child(3) .icon-wrapper { background: linear-gradient(145deg, #fff0e0, #ffe6d5); } /* E-com */
        .menu-button:nth-child(4) .icon-wrapper { background: linear-gradient(145deg, #eae3fc, #ddd2f5); } /* BI */
        .menu-button:nth-child(5) .icon-wrapper { background: linear-gradient(145deg, #fef7e0, #fcedc5); } /* KIS */
        .menu-button:nth-child(6) .icon-wrapper { background: linear-gradient(145deg, #f0e0fc, #e8d2f5); } /* ML */
        .menu-button:nth-child(7) .icon-wrapper { background: linear-gradient(145deg, #fee7e0, #ffd9d0); } /* Web Design */

        /* Адаптация для маленьких экранов */
        @media (max-width: 380px) {
            .app-container {
                padding: 20px 16px;
            }
            
            .icon-wrapper {
                width: 48px;
                height: 48px;
            }
            
            .icon {
                font-size: 28px;
            }
            
            .button-text span {
                font-size: 15px;
            }
        }

        /* Адаптация для очень маленьких экранов */
        @media (max-width: 320px) {
            .menu-button {
                padding: 8px 14px 8px 12px;
                gap: 12px;
            }
            
            .button-text span {
                font-size: 14px;
            }
        }

        /* Предотвращение выделения текста при тапе */
        .menu-button {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>

 <!-- Кнопка 7: WEB Дизайн (Frontend) - НОВАЯ -->

        <!-- Небольшой футер с версией -->
        <div style="text-align: center; margin-top: 24px; font-size: 12px; color: #8a9aa8; opacity: 0.6;">
